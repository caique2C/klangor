plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// versionCode is derived from the version name (pubspec.yaml's plain "X.Y.Z",
// no "+build" suffix needed/used) rather than tracked as a separately
// incremented number - one less thing to remember to bump per release, and
// it's mathematically guaranteed to keep increasing as long as the version
// name itself does. Supports an optional non-numeric suffix per component
// (e.g. "3-beta") by taking only the leading digits.
def parseVersionComponent(String component) {
    def match = (component =~ /\d+/)
    return match ? match[0].toInteger() : 0
}

def versionParts = flutterVersionName.tokenize('.')
def versionMajor = versionParts.size() > 0 ? parseVersionComponent(versionParts[0]) : 0
def versionMinor = versionParts.size() > 1 ? parseVersionComponent(versionParts[1]) : 0
def versionPatch = versionParts.size() > 2 ? parseVersionComponent(versionParts[2]) : 0
def computedVersionCode = versionMajor * 10000 + versionMinor * 100 + versionPatch

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.klangor.app"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    defaultConfig {
        applicationId "com.klangor.app"
        minSdkVersion flutter.minSdkVersion
        targetSdk 35
        versionCode computedVersionCode
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }

    dependenciesInfo {
        includeInApk = false
        includeInBundle = false
    }
}

def abiCodes = ['armeabi-v7a': 1, 'arm64-v8a': 2, 'x86_64': 3]
android.applicationVariants.configureEach { variant ->
    variant.outputs.each { output ->
        def abiVersionCode = abiCodes[output.getFilter('ABI')]
        if (abiVersionCode != null) {
            output.versionCodeOverride = variant.versionCode * 10 + abiVersionCode
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
